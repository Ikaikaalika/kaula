# Phase 1 runnable config (~50M-class target with simplified implementation)
model_name: latent_ssm_diffusion_small
parameter_target: 50000000

# Input / latent geometry
clip_len: 8
image_size: 64
channels: 3
latent_dim: 192
action_dim: 4

# Encoder / decoder
encoder_hidden_channels: 64
decoder_hidden_channels: 128

# SSM backbone
ssm_backend: linear_recurrent  # options: mamba, s4, dss, linear_recurrent
ssm_hidden_dim: 256
